front:
  text: 子華子卷之十
  hash: sha256:d10891e6ea5ad2d798c9b2f8849a32fee6d3fc55d0905aa4cd7292b224ddea6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_HFL_010-001a, image: hfl/0841/0841-116.png}
body:
  text: 晉人程本著神氣子華子曰古之至人探幾而鉤深與天通心清明在躬與帝同功是以進為而在上則至精之感流通而無礙以上行而際浮以下行而極憂以旁行而塞於四表不言而從化不召而效證以其所以感之者內也伏羲神農之世其民童蒙瞑瞑蹎蹎不知所以然而然是以永年黃帝堯舜之世其民朴以有立職職植植而弗鄙弗夭是以難老末世之俗則不然煩稱文辭而實不效知譎相誕而情不應蓋先霜霰以戒裘爐者矣機括存乎中而羣有詐心者族攻之於外是以父哭其子兄喪其弟長短頡牾百疾俱作時方疫癘道有繦負盲秃狂傴萬怪以生所以然者氣之所感故也夫神氣之所以動可謂微矣日月薄食虹霓晝見五緯相凌四時相乘水竭山崩宵光晝冥石言犬痾夏霜冬雷繆盩之族諸禍之物不約而總至所以然者氣之所成故也夫神氣之所以動可謂微矣故曰天之與人其有以相通此之謂也留務兹從子華子遊者十有二年目相屬而言不接也業成而辭歸將隱居於五源之溪子華子曰天下之物有甚滑稽而難持者女知之矣乎疾之則脫緩之則浟焉以逝非捉圜之謂也而所謂善持者能為之於疾徐之間今女之所治吾無間然者矣然子之志則廣取而泛與者也吾恐女之後夫擇者也其將有剽女之外郛而自築其宫庭者矣登女之車而乘之以馳騁於四郊者矣取女之所以為璧者毁裂而玉分之者矣夫道固惡於不傳也不傳則妨道又惡於不得其所以傳也不得其所以傳則病道今女則往矣而思所以愼厥與也則於吾無間然者矣子車氏之猳其色粹而黑一産而三豚焉其二則粹而黑其一則駁而白惡其弗類於已也囓而殺之決裂其腎腸麋盡而後止其同於已者字之惟謹而恐其傷也子華子曰甚矣心術之善移也夫目眩於異同而意怵於愛僧雖其所自生殺之而弗悔而況非其類矣乎今世之人其平居把握附耳呫呫相為然約而自保其固曾膠漆之不如也及勢利之一接未有毫澤之差蹴然而變乎色又從而隨之以兵甚矣心術之善移也無以異乎子車氏之猳宋有澄子者亡其緇衣順塗以求之見婦人衣緇衣焉援之而弗舍曰而以是償我矣婦人曰公雖亡緇衣然此吾所自為者也澄子曰而弗如速以償我矣我昔所亡者紡緇也今子之所衣者禪緇也以禪緇而當我之紡緇也而豈有所不得哉子華子曰夫利之惛心也幸於得而已矣忘其所以為質者矣幸於得而忘其所以為質夫何所憚而不為之哉今世之人求其不為澄子者或寡矣子華子曰今世之士其無幸歟川閲水以成川世閲人而為世河之下龍門也疾如箭之脫筈人壽幾何而期以有待也治古之時積美于躬如膚革之就充惟恐其不修弗憂於無聞如擊考鼓鐘其傳以四達繹如也今則不然荒飈怒號而獨秀者先隕霜露霄零而朱草立稿媾市之徒又從而媒孽以髠搖之是以萌意於方寸未有毫分也而觸機穽展布其四體未有以為容也而得拱梏懷抱其一槩之操泯泯默默而願有以試也而漫漫之長夜特未旦也疾雷破山澍雨如霪雞喑於塒而失其所以為司晨也人壽幾何而期以有待也今世之士其無幸歟子留子築居於五源之溪使其徒公子賓胥見子華子於齊曰先生之役子留子使賓胥也敬以有請夫五源之溪天下之至窮處也鼯吟而鼬啼且曉昏而日昳也蒼蒼踟蹰四顧而無有人聲雖然其土脈膏以發其植物也兌兌以澤其清流四注無乏於濯溉其蘋草之芼足以供祭也流光馳景却顧於斷蹊絶壑之下雲雨之所出入也其石皴栗爛如赭霞花草之芳從風以揚壟耕溪飮為力也佚而坐嘯行歌可以卒歲今先生之年運而往矣而其所以藴藏者無期惟是汾河之間不吾容也而寄食於海瀕歲又弗稔其何以供億今之諸侯其地相埓也其德相若也先生之車軫其將誰氏知之是以子留子使賓胥也敬以有請無寧先生而肯照臨於山之中將使斯人也耳聞而目明先生豈無意於此子華子曰爾歸而語而夫子矣而以所以屬於我者渠渠不忘於我之心鼎鼎如也吾聞之太上違世其次違地其次違人而之所志其違地矣乎曩者吾有緒言於會矣曰我必死爾以吾骨反而涉河以從吾先人於苓塞之下我之意也已有所在矣不得而從於爾之求矣夫志之所存雖逖而親雖缺而成疆裂壤斷不吾間也而今而後吾之神爽坐馳於五源之間而亦將朝夕而惟余是從吾何必往也嘻來賓胥我之不得往猶而夫子之不得來也詩不云乎莫往莫來使我心疚吾之與而夫子也其弗覿矣夫子華子自齊而歸召子元而訓之曰來爾會而小人其謹志之昔吾之宗君為周曰正周公作成周定鼎於郟鄏修和周郊於是吾之宗君薦其所以為祥者其族有三曰井里之璞也曰大山之器車也曰唐叔異畝之禾也唐叔得禾異畝同穎吾之宗君請以為獻王命分寶玉于魯公時庸展親歸禾於周公作歸禾周公旅天子之命作嘉禾是以吾之宗君始有蒲璧以朝作程典令其顯庸書在故府逮宣王之時吾之宗君入董六師為王虎臣是曰司馬司馬之後凡九世而其子孫或播居於汾河之間十有一世而國并於溫先大夫宣王之棄世也背違其群而吾之宗君厥有大造於趙宗如瓜苗之有衍我是以庇其榮而食其實及吾之身雖不釋於簡主而趙則真吾姓之所宗氏也今主君之為人強毅而法能忍詬而無慝挺挺而不回且受人之規言其將光啓于趙氏之業而大其前人吾且老矣而不得以相其成來爾會其小人其謹志之其勿有二心以事主君惟是窀穸之事吾之所以後其先人者弗儉弗侈允釐其中其勿以世俗之垢昏而以浼我之所修乃若爾會之所以自勗者則惟無宗君之黍其於我亦預有無窮之聞來爾會而小子其謹志之子華子卷之十
