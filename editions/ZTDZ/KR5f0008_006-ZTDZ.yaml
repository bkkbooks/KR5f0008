front:
  text: 子華子卷之六
  hash: sha256:48ba982d533cc454bd343409e97ea7f963e2d283e82a363bd31ef68d4539b12d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_SJB_006-270192b, image: sjb/27/270192b.png}
body:
  text: 晋人程本著晏子問黨晏子見於子華子曰日者嬰得見於公公惡夫羣臣之有黨也曰子將何方以弭之嬰無以應也吾子幸教以所不逮虚心以承子華子曰嘻君之及此言也齊其殆矣乎游士之所以不立於君之朝以黨敗之也人主甚惡其黨則左右執事之臣有以藉口矣夫左右執事之臣其託寵也深其植根榦也固背誕死黨之交布散離立聮累羅絡而爲之疏苟非其人也則小有異焉者不得以參處乎其中間也士以潔廉而自好者夫孰肯舍其昭昭以從人之昏昏洒焉若將有浼焉必不容矣是以左右執事之臣因其脩而隳之曰黨人也人君曾不是察隨其所甚惡而甘心焉於是有流放戮辱之事夫士之自好者削斲數椓足以自庇而一簟之食足以糊口其孰肯以不貲之軀而投人主之所必怒者耶嘻君之及此言也齊其殆矣乎小人之始至於齊也小異者不容而已矣今則疑似者削跡矣小人之始至於齊也媕婀脂韋者未必御也今則服冕而乘軒者矣小人之至於齊爲日未數數也而其變更如此齊其未艾也人君曾不是察而左右執事之臣又原君之所惎惡因以隳游士之脩舉齊之朝將化而爲私人矣日往而月易築壇級於公宫而君不得知也嘻君之及此言也齊其殆矣乎子華子謂晏子曰夫治有象大夫亦嘗聞之矣乎晏子曰嬰願聞之於吾子矣子華子曰治古之時其君之志也端以有脩其臣同德比義而無有異心朝無幸位事無失業其四野之外耒耜從其宜溝畎以其便其民願而從法疏而弗失上下翦翦惟其君之聽盭氣伏息灾疫不作四鄰寢兵而珪玉纁幣以承其權此非治象而云何今齊之正言不聞聰明不開朝茀而不除野荒而荐饑其去治象也遠矣無等級以寄言者矣本聞之下無言謂之喑上無聞謂之聾聾喑之朝上有放志而下多忌諱齊之謂也且合升勺龠合以登之斛廪則成矣太山之高非一石之積也瑯瑘之東渤澥稽天非一水之鍾也所以治國家天下者非一士之言也今齊之執事者其悖矣乎墨以爲明狐而爲蒼以一爲二以二爲三公不能禁也植黨與而護其所同忌前而排孤媕婀脂韋者日至於君之前固寵而恃便公不能禁也猶之買馬者然不論其足力而以色物毛澤而爲儀則廐無走馬矣猶之售玉者然不論其廉貞温粹而無瑕者而以大小徑廣爲儀則篋無連城矣惟士亦然論士不以其才而以勢地爲儀則伊尹仲父不立於朝矣且齊之爲國也表海而負嵎輪廣隈澳其塗之所岀四通而八達游士之所湊也今齊君之所習而狎者非鮑國之私人則崔田之黨也游士無所植其足矣游士無所植其足則憑軾結轍而違之夫游士之所以去則治象之所以不存也本聞之窮鄉下里其爲叢祠也不過於巵酒而臠肉蕪國之社不難於請福今齊之蕉萃也甚矣所欲以爲治者不半於古之人而功則畧具矣夫子之於齊君也朝夕進見而猶固惜自愛也獨不出其謦欬而規以振起之夫子之仁心抑已褊矣晏子曰善微吾子嬰無所聞之嬰之於君大之臣也吾子之言之也嬰則有罪矣晏子問於子華子曰聖人尚儉於傳有之乎子華子曰有之夫儉聖人之寳也所以御世之具也三皇五帝之所留察也晏子曰嬰聞之堯不以土階爲陋而有虞氏怵戒於塗髹其尚儉之謂歟子華子曰何哉大夫之所謂儉者夫儉在内不在外也儉在我不在物也心居中虚以治五官精氣動薄神化回潏嗇其所以出而謹節其所受然後神宇泰定而精不摇其格物也明其遇事也剛此之謂儉而聖人之所寳也所以御世之具也三皇五帝之所留察也何哉大夫之所謂儉者夫視入以爲出庾氏之職業也操贏而制餘啇賈子之所爲也中人之家計口然後食閭里之志也乃若天子者大宫也有天下者大器也臨萬品御萬民窮天之産罄地之毛無有不共無有不備此則古今常尊之執也柰何而以閭里之所志商賈子之所爲庾氏之職業仰而議夫堯舜之量哉此腐儒之所守而汙俗之所以相欺者也土階塗髹之說野人之所稱道而於傳所不傳者也本聞之堯居於衢室之宫垂衣而襞幅邃如神明之居輯五瑞以見羣后帶幅舄而入覲者如衆星之拱北堯則若固有之也舜遊於巖廊之上被袗衣而鼓五絃之琴畫日月於太常備十有二章黼黻玄黄爛如也出則有鸞和動則有珮環步趨中於莖韶之節舜亦若固有之也夫堯舜之備物也如此而惡有所謂土階三尺茅茨不翦者惡有所謂塗髹以自怵戒者此腐儒之所守而汙俗之所以相欺者也故記所不道也桀紂之亡天下也以不仁而不以奢也戒奢者有禮存焉禮之所存可約則殺可豐則腆豈有覽四海之賦受九畡之經入而土階以居欲以塗髹而不敢也其不然也必矣且先王之制也改玉則改行旂旒冕璪以示登降之品今汙世人不通於禮也處尊而偪賤居大而侵小夫以至公之尊而圉隸以自奉難爲其下矣不惟以陋於厥躬也而又旁無以施其族黨上不豐其宗祧曰吾以是爲儉也不亦夷貊之人矣乎晏子曰善微吾子嬰無所之聞也終不敢以論約子華子卷之六
