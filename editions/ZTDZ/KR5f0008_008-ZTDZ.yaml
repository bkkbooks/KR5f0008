body:
  text: 晋人程本著大道子華子曰大道有源其源甚真名曰空洞空洞無有是生三元三元之功同立於玄縱而守之是謂三極衡而施之是謂三紀上下貫焉是謂三才一之所成萬紀以生一之所綱萬有以藏是故空者無不備之謂也洞者無不容之謂也大道之源其源甚真無物不禀無物不受無物不度廣盡於無畛細淪於無間付畀稟受而不加貧醻酢應對而不加費故曰通於一萬事畢此之謂也子華子曰仰而視之玄在焉俛而察之玄在焉旁行而四達玄在焉迎而望之玄參乎其前也揠足窘行去而違之玄瞠乎其後也是故玄無所不在也人能守玄玄則守之不能守玄玄則舍之子華子曰火宿於心炎上而排下其神躁而無準人之慕急以取禍者心使之也木宿於肝觸突干抵而銳其神狷束而無當人之樸戇以取禍者肝使之也金宿於肺䃘訇而不屈罄而不能仰也甚神闊踈而無法人之訐決以取禍者肺使之也水宿於腎瑟縮以凑險其神伏而不發人之媕婀脂韋以取禍者腎使之也土宿於脾磅礴而不盡其滲漉也下注而不止其神好大而無功人之重遲澀訥以取禍者脾使之也火氣之喜明也木氣之喜達也金氣之喜辨也水之氣藏也土之氣發生也是故事心者宜以孝事肝者宜以仁事肺者宜以義事腎者宜以知事脾者宜以誠實而不詐五物宿於其所喜五事官施其所宜外邪之不入内究之不泄夫是之謂善完子華子曰甚矣世之人注其目於視也目奚足信今有美麗佼好之人人之所同悅也然而蒙之以倛首則見之者棄之而走更衣之以輕紈阿禓焉則向之走者留行矣甚矣世之人注其目於視也目奚足信周舍見子華子曰舍聞之身修而名不立無爲於擇術矣庶羞百品雜進於盤几而咽不下無爲於貴饌矣抱壁而徒乞無爲於貴寳矣敢問之所以志子華子曰然釜槩之於量也不能以容於所不受尋墨之於度也不能以及其所不至鈞天廣奏飛鳥過而不止崇楹繢拱猱狖逃焉且員動而方息所性不同也火炎而水流習使之然也今以大夫之所處而議本之所以志必不諧矣無以則有一焉而願因以有獻也夫六虚有精純粹美之氣而不敢以傳焉託於物以寫其響流形於萬有而不敢以有爲試嘗論其微矣佼麗之若窳也而醜則堅牢華壁之易以碎也而金鐵則難陶甚矣物之不可以全也如是是不可以一方取也是不可以一伎爲也惟知道者幾幾乎其能全今大夫少脩而端慤壯長伉以有立方將揭其昭明焉而以爲人之的其犯難也果其量物也褊而又且徑徃而直前矯拂人之所不欲而䂓以自立甚無所用之虚名此非本之所得知也夫目之明能見於百步之外而顧不見其背也惟墻之後則無睹也無以則有一焉而願因以有獻也子華子曰萬物玄同孰是而孰非孰知其初孰知其終吾無得其所以然也命之曰一一者衆有之宗也道得之謂之太一天得之謂之天一帝得之謂之帝一帝一也者立乎環中扣其響而不得也味其臭而不得也渾渾兮如有容泊兮如未始出其宗茫茫兮如無所終窮天一也者爲而不宰成而不有機之所由以出焉機之所由以入焉太一也者無不有家能化一以爲二化二以爲三因三以成萬物故曰一之變大矣在三而三在九而九有萬不同而管于一術通乎一術無一之不知昧乎一術無一之能知是故音聲顔色臭味之數不過於五五者立於一一立而萬物生矣子華子曰寒濕温燥晦眀之變則大矣形怛乎化則涸而其形無盡喜怒哀樂思懼之化則備矣神經乎變則涸而其形有餘正氣之在人也上下灌注如環之無端莫知其紀極也不可以爲量也是能使其神之所澤鬱鬱勃勃而不可屈是能使其形之所宅完固静專而不可撓是故能通於養氣之術者不可以不務白也且氣不勝邪攻之矣攻之而不已則氣必挫挫之而不已則向於消亡矣正氣漸盡邪術壯長心傷於中而色澤外變神去其榦而死矣是以古之知道者築壘以防邪䟽源以毓真深居静處不爲物攖動息出入而與神氣俱魂魄守戒謹窒其兑專一不分真氣乃存上下灌注氣乃流通如水之流如曰月之行而不休陰營其藏陽固其府源流泏泏滿而不溢沖而不盈夫是之謂久生子華子曰人之性其猶水然水之源本甚潔而無有衰穢其所以湛之者久則不能以無易也易而不能反其本初則還復疑於自性者矣是故方圓曲折湛於所遇而形易矣青黄赤白湛於所受而色易矣砰訇淙射湛於所閡而響易矣洄洑浟溶湛於其所以容而態易矣醎淡芳奥湛於其所以染而味易矣凡此五易者非水性也而水之所以爲性者則然矣是故古之君子慎其所以湛之子華子曰天地之大數莫過乎五莫中乎五五居中宫以制萬品胃之實也沖氣之守也中之所以起也中之所以止也龜筮之所以靈也神響之所以豐融也通乎此則條達而無礙者矣是以二與四抱九而上躋也六與八蹈一而下沉也戴九而履一據三而持七五居中宫數之所由生一從一横數之所由成故曰天地之大數莫過乎五莫中乎五通乎此則條達而無礙者矣子華子卷之八
