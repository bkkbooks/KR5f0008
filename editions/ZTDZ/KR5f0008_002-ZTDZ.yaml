  text: 子華子卷之二
  hash: sha256:14c6aec9a208e0f2f3320e1e6c9cb14ec194287404805ad845fba1e4511447bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_SJB_002-270184c, image: sjb/27/270184c.png}
body:
  text: 晋人程本著孔子贈子華子反自郯遭孔子於途傾蓋而顧相語終日甚相親也孔子命子路曰取束帛以贈先生子路屑然而對曰由聞之士不中間見女嫁無媒君子不以交禮也有間又顧謂子路子路又對如初孔子曰固哉由也詩不云乎有羙一人清風婉兮邂逅相遇適我願兮今程子天下之賢士也於斯不贈則終身弗能見也小子行之子華子曰惟道無定形虚凝爲一氣散布爲萬物宇宙也者所以載道而傳焉者也萬物一也夫孰知其所以起夫孰知其所以終凝者主結勇者管散一開一歛萬形相禪太古之時澹泊恬愉鹿聚而麕居其知徐徐其樂于于夫是之謂宇有無以相反也高下以相傾也盛盈蚠息以相薄也庬洪蘆符以相形也由是以生由是以死由是以虧由是以成夫是之謂宙宇者情相接也宙者理相通也是故惟道無定形虚凝爲一氣散布爲萬物宇宙也者所以載道而傳焉者也子華子曰夫言之所以感爲響響欲絶而感已移意之所以將爲思思未革而事前輟何則精神之所弗包焉故也七十九代之君法制不一號令不齊而俱王於天下明旌善類而誅鋤醜厲者法之正也其所以能行焉精誠也精誠不白則無以王矣其在後世以急刻而責恕以譌僞而課忠言非其願意非其眞而保人之弗叛悲夫是正坐於夕室也是白之懸而黑之募也是縱櫂於陸而發軔於川也其亦不可以幸而幾矣是以欲治之君將以有爲於是者必先正其本術定其精而不摇保其誠而弗虧夫然後出言以副情端意以明指世雖亂也俗雖汙也而曰感不效於影響者吾斯之未能信子華子居於苓塞趙簡子將用之使使者將弊於閭曰寡大夫乏使使下臣敬修不腆以勤先生之將命者子華子反弊再拜以肅使者而進之於庭又拜而授辭曰主君之民某如獲罪戾其敢逃刑以其弗嗇之故而適抱薪纆之憂疾且有間則我請造於朝其敢重辱我主君之命使者曰寡大夫且有緒言使下臣敬致諸執事惟是晋國之寵靈願與先生共之先生不違勤而貺以行請禄從者以爵執圭子華子没階而進再拜而言曰主君之民某未有職業於朝也且有惡疾不堪君之命弗敢以與聞再拜而送使者於門反其室聚帑將行其弟子族立而疑北宫子曰意聞之身修於私名升於公古今之通誼也主君國之宗卿也政所自出以禮交而弗答無乃不可乎子華子曰意吾以爾爲可以忘言也而猶有萌焉夫萌於中必瞢於外其意之謂矣且彼召我者夫豈徒然哉必有以處我者矣爲人之所處者不得安其所自處矣是故古之人慎於其所以處也昔者吾反自郯聞語於孔子屬屬焉不忘於心孔子之所志其過人者遠矣日者主君之召也孔子轍環於河滸而弗肯以濟援琴而寫志命之曰臨河之操其辭曰河之水洋洋兮丘之不濟此命也夫孔子之所以弗至是乃我之所以行也意吾以爾爲可忘言也而猶有萌焉夫以小人之所察而量君子之心意爾其殆矣北宫子遂强以見趙簡子簡子聞子華子至再拜而迎曰不穀得奉社稷之靈以撫有四封之内先君有禮所以貺賓客而交際之紀廬人實典治之吾子辱而在於弊邑有日矣以歲之不易而隸人有朝夕之虞願致戎邑方三四十里若五六十里以爲芻秣之共吾子其曲意以臨之子華子曰臣也不武年運而徃矣顛毛種種懼不任君之事以爲司敗憂也君有四圍以扞四方臣弗堪也明日子華子行食於茭亭之口北宫子曰秦未有失也絶人之善意而又刮迹以去之夫子所以責人者太察矣子華子曰然非爾所及也夫秦君之志大而求遠其所以望於我者厚則吾無以堪其求矣且爾亦聞牧野之事乎周之六師壓郊而陳武王韈係解焉有五臣者將受誓事於前王顧而使之係五臣者相目而對曰臣之所以事君王非爲係韈者也王不得已乃釋旄𨱆而親係之夫人君能致其臣能有所不爲然後可以責之以有爲人臣能有所不爲然後能無不爲也本也未能無不爲者也能有所不爲矣子華子違趙趙簡子不悅燭過典廣門之左簡子召而語之以其故燭過對曰彼庶人也而傲侮公上法所弗實也且無以爲國矣簡子曰而士以兵之燭過至苓塞子華子之行者五日矣燭過及命曰無及也簡子悔之使使者於齊百使董安于寓書以招之子華子稽首而來再拜以肅使者于庭而授之辭曰主君之亡臣某不能束脩越在諸侯以爲主君憂臣聞之物扃於所甘士扃於所守主君之亡臣不佞而有四方之志其敢以爲執事者之所辱夫丘陵崇而穴成於上狐狸藏矣溪谷深而淵成於下魚鼈安矣松柏茂而陰成於林塗之人則䕃矣主君之亡臣不佞實有隱衷唯執事者昭眀其所存如日月之升以光燭於晋國將四海之士重繭狎至以承主君之令聞夫豈惟亡臣亡臣雖復野死以寘溝甽其敢忘主君之賜惟執事者財幸焉簡子得書召無恤而戒之曰燭過小人也實使我獲罪於本吾且死汝必反之慎不忘也襄子曰諾子華子卷之二
