front:
  text: 子華子卷之四
  hash: sha256:f832fecbbc022dcc7a5f893203367749b17717f558b8aedd0f8ed033a997b5da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_SJB_004-270188b, image: sjb/27/270188b.png}
body:
  text: 晋人程本著虎會問虎會以其私問於程子曰主君何如主也程子曰昔堯舜在上塗說而巷議所不廢也是是非非之謂士試爲吾子搉言之本也不敢以古事爲考先大夫文子之志也好學而能受規諫立若不勝衣言若不出口身舉士於白屋之下者四十有六人皆能獲其赤心公家賴焉及其殁也四十有六人者皆就賔位是其無私德也夫好學知也受規諫仁也無私德焉忠也江之源出於汶山其大如甕口其流可以濫觴順沿而下控諸羣荆廣袤數千里方舟然後可以濟此無他故也所受於下流者非一壑也夫先大夫文子其訓於是矣是以有孝德以出公族有恭德以升在位有武德以羞爲正卿用能光融於晋國顯輔其君以主盟於諸夏天下賴其仁兵矟之不試者垂十許年今主君懋昭其勳庸而光賁於趙宗無以則先大夫文子是焉取則尚德率義以弘大其光烈其將有譽於四方也乃若范氏中行氏弗自克也而以覆其宗卿此則主君之所知也虎會曰辯矣夫子之言願少進也會得間而謁諸主君庶幾其有瘳程子曰詩不云乎王欲玉女是用大諫夫紏其邪志而濟其所之是忠臣之所留察也吾子其勉行之矣本聞之山有猛虎林樾弗除江河納汙衆流是瀦昔者秦穆公以秦之士爲不足也起蹇叔於宛迎邳豹於鄭取由余於戎抜百里奚於市用强其師以伉慧懐于斯時也晋國翦焉惟秦是從是故國以士爲筋幹不可以不察也今主君之未得志也有竇叔子者推其後而進之有舜華者挽其不及而使之當於理有吾丘鴆者展布四體以爲紀綱之僕本聞之竇叔子之爲人也强毅而有立方嚴而不剉其事主也齊戒祓濯而無有回心舜華多學而强記恥其所聞不惠於古初其立論挺挺而不可以奪吾丘鴆年十有五而始以勇力聞及其壯佼也四鄰畏之能以人投人以車投車其視太行之險猶之步仞之丘此三臣者舉晋國之選也主君之所與懋昭其庸而光賁于趙宗者也公室六分河山之間龜折而鼎立范氏中行氏不庇其社而頽其宗主君之所不刊則繄此三臣之助今無故而戮叔子矣又斃舜華於野以罪名不聞於國人吾丘鴆恐焉睘粮而之於他國主君其未之思耶何其首尾之剌戾也如是則主君之所以遠於大競者也吾子主君之信臣也夫人誰無過過而能改心焉聖人之所畏也今吾子能弗憚煩而以其眇眇之思務以箴主君之闕遺將國人是賴吾子其勉行之矣子華子見齊景公公問所以爲國奈何而治子華子對曰臣愚以爲國不足爲也事不足治也有意於爲則狹矣有意於治則陋矣夫有國者有大物也所以持之者大矣狹且陋者果不足以有爲也臣愚以爲國不足爲也事不足治也公曰然則國不可以爲矣乎子華子曰非然也臣之所治者道也道之爲治厚而不博敬守其一正性内足羣衆不周而務成一能盡能既成四境以平唯彼天符不周而同此神農氏之所以長也堯舜氏之所以章也夏后氏之所以勤也夫人主自智而愚人自巧而拙人若此則愚拙者請矣巧智者詔矣詔多則請者加多矣請者加多則是無不請也主雖巧智未無不知也以未無不知應無不請其道固窮爲人主而數窮於其下將何以君人乎窮而不知其窮又將自以爲多夫是之謂重塞之國上有諱言之君下有苟且之俗其禍起於欲爲也其禍起於願治也夫有欲爲願治之心而獲重塞之禍是以臣愚以爲國不足爲也事不足治也昔者有道之世因而不爲責而不詔去想去意静虚以待不伐之言不奪之事循名覈實官庀其司以不知爲道以奈何爲寳神農曰若何而和百物調三光堯曰若何而爲日月之所燭舜曰若何而服四荒之外禹曰若何而治青北九陽奇怪之所際是故此王者天下以爲功後世以爲能以故記之所道而君之所知也臣戇而不知方始而至於朝也竊有疑焉齊之所以爲齊者抑以異矣鐘鼓祝圉日以抎考而和聲不聞司空之刀鋸斷斷如也而罪罟滋長諸侯之賓客膏其唇吻而争進諛言左右在廷之人主爲蔽蒙僮夫竪隸曉然皆知公上之有慆心也造爲謌謡以蠱君心君曾不之知也冕旒清晨位宁以聽惄焉以古人自耦君之心則泰矣夫其誰而顧肯以其一介之鄙試嘗君之嗜好而以干其不測之禍臣戇而不知方始而至於朝也竊有疑焉夷考所由來以君之心勝故也心勝則道不集矣羣臣之不肖者又隨而揚之故其弊目以深其固如性而君曾不之知也夫以君之明疏淪其所底滯而開之以鄉道夫孰能禦之抑臣聞之萬物之變也萬事之化也不可爲也不可究也因其然而推之則無不得其要者矣故臣愚以爲國不足爲也事不足治也公曰洋洋乎而之所以言吾欲以有説而無所措吾辭而之道博大而無倪吾所不能爲也嘗曰有以拂吾之陋心子華子退而食於晏氏子華子徃見季沈季沈曰自吾從於夫子也轍迹不遺於四國未有終歲以處也夫子亦勤且病矣哀也鄙人不通於夫子之量天下失道黑白溷溷而吾夫子駕其說將安之哀將有以請而弗敢也願質之於吾子子華子曰然仲尼天也其可違物而奠處乎其可絶物而自營乎日月不于宙四指必迷所鄉矣仲尼人之準繩也仲尼之轍迹則病矣而亦皇暇之恤季沈曰敢問吾子之不試何也子華子曰本也何足以望夫子夫子軫方而轂圓者也將無乎而不可我則有所可也夫以我之所可而從夫子之無乎不可逝將從其後也子華子卷之四
