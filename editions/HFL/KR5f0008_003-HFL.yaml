front:
  text: 子華子卷之三四同卷顛六
  hash: sha256:61d7e0a584020ca1b12dd592517c56241ccd5317b974bd22b0192478bf9519b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_HFL_003-001a, image: hfl/0841/0841-034.png}
body:
  text: 晋人程本著北宫子仕北宫子將仕於衛子華子曰意來子之所以自事其心者亦嘗有以語我乎北宫子曰意未得以卒業也以是樵蘇之弗繼糊其頤頰於人雖然謹志其所欲爲於善而違其惡也庶幾於完子華子愀然變乎容有問曰意是何言歟善奚足願而惡奚足違吾語若聖人不出天下潰潰日趨於迷欲以有已而卒於喪也己欲以達之於人而卒於失人凡以善故王者作興將以濯滌今世之惛怓去善其殆可乎哉善弗去亂未艾也而又奚以善爲北宫子曰嘻有是哉願畢其說子華子曰人中虚圓不徑寸神明舍焉事物文滑如理亂棼如涉驚浸一則以之怵惕一則以之忌諱一則以之懲創是則一日之間一時之頃而徑寸之地如炎如冰矣夫所謂神明者其若之何而堪之神弗留則蠹明弗居則耗而又奚以善爲古之知道者泊兮如大羹之未調兮如將孩隨推而遷因蕩而還精白津津若遺而復存其神明休休常與道謀去羨去慕孰知其故今子之言曰謹志於爲善則不善者將誰與耶違子之所惡則惡將誰歸耶予而勿受歸而勿納則必有忿悁之心起而與我立敵矣以我矜願之意而接彼忿悁之心何爲而不鬭鬬且不止小則囂凌詬詳大則碎首穴胸夫以若之言而幸於完其幾於殆矣北宫子曰嘻若是其甚也子華子曰有甚哉吾語若禍之所自起亂之所由生皆存乎欲善而違惡今天下老師先生端弁帶而説乃以是召亂也學者相與熏沐其中扃而亦唯此之事是事禍也父以是故不慈子以是故不孝兄以是故不友弟以是故不共夫以是故不帥婦以是故不從君以是故不仁臣以是故不忠大倫蠹敗人紀消亡結轍以趨之而猶恐其弗及也悲夫石碏欲完其名而殺厚公子輙欲專其國而拒蒯聵寤生克段忽出而突入季友鴆慶父叔向誅鮒雍紏之妻尸紏於朝莊或作叔仲子欲託其帑於魯而先斃其室先君厲公一言而殺三郤華督父並忽或作思於與夷毛舉其目尚不勝爲數也是皆名爲求得所欲而能違所不欲者矣然且大倫斁敗人紀消亡結轍以趨之而猶恐其弗及也悲夫吾語若亂之所由生禍之所自起皆存於欲善而違惡夫人之中虚也不得其所欲則疑得其所不欲則惑疑惑載於中虚則荆棘生矣父不疑於其子子必孝兄不疑於其弟弟必共夫不疑於其婦婦必貞君不疑於其臣臣必忠是還至而效者也百事成而一事疑道必廢三人行而一人惑議必格大道之世上下洞達而無疑志堯舜三代之王也無意於王而天下治所循者直道故也是以天下和平天下之所以平者政平也政之所以平者人平也人之所以平者心平也夫平猶權𢖍然加銖兩則移矣載其所不欲其爲銖兩者倍矣故曰矜功者不立虚願者不至非惟不足以得福而行又以召禍故吾不悦於子之言今子亦平其所養而直以行之何徃而不得何營而不就而又奚以善爲且善不可以有爲也堯曰若之何而善於予之事舜亦曰若之何而善於予之事是上與下争爲善也上與下争爲善是兩實也兩實則烏得平平不施焉則惡得直失其所以平直則堯無以爲堯矣舜無以爲舜矣吾子謹志於堯舜也而又奚以善爲北宫子之衛主於叔車氏叔車氏有寵於衛君國人害其嬖而將討之北宫子喟然歎曰吾爲是違夫子之言也是以獲戾於此也吾何以衛爲致其所以爲臣而歸晏子治阿三年毁聞於朝公不悅召而將免焉晏子辭曰臣知過矣請復之三年而舉國善之謡言四達公將致其所以賞晏子辭焉公曰何謂也晏子對曰昔者臣之所治君之所當取也而更得罪焉今者臣之所治君之所當誅也而更得賞焉非臣之情臣不願也子華子聞之曰晏子可謂直而不阿者矣晏子之辭受其可以訓矣齊之蕪也固宜夫人之常情譽同於已者助同於已者愛同於己者愛之反則憎必有所立矣助之反則擠必有所在矣譽之反則毁必有所歸矣然而人主不之察也左右執事之臣從而得其所欲爲則不禁也世之治亂蓋常存乎兩間齊之蕪也固宜子華子曰元者太初之中氣也天帝得之運乎無窮后土得之溥博無疆人之有元百骸統焉古之制字者知其所以然是故能固其元爲完具之完殘其所固爲寇賊之寇加法度焉爲冠冕之寇故曰殘固之謂寇毁賊則爲賊夫穿垣竇發鎬鐍其盗之細也夫子華子卷之三
