front:
  text: 子華子卷之七顛八
  hash: sha256:3c9906e6dda3fdb0684983da0836ad8e0f908cb6be732bdc59fce5880f076096
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_HFL_007-001a, image: hfl/0841/0841-080.png}
body:
  text: 晋人程本著執中子華子曰聖人貴中君子守中中之爲道也幾矣寓中六指中存乎其間兩端之建而中不廢也是故中則不既矣小人恣睢好盡物之情而極其執其受禍也必酷矣何以言之朱明長贏不能盡其所以爲温也必隨之以揫歛之氣而爲秋玄武沍陰不能盡其所以寒也必隨之以敷榮之氣而爲春孰爲此者天也天且不可以盡而況於人乎是故誠能由於中矣一左一右雖過於中也而在中之庭一前一却雖不及於中也而在中之皇及小人好盡則遠於中矣遠於中則必窘於邊幅而裂矣必觸於巖墻而僵矣必墜於阬塹而亡矣如以石而投之於淵也不極則不止矣悲夫天道惡盡而昧者不之知也古之君子齊戒以滌其心奉之而不敢失者其中之謂歟天地覆壓中不磨也陰陽并交中不渝也五色玄黄亂於前中不失也悲夫世之小人快其志於俄頃之久而促失其所以爲中也危國喪身而不早悟也惟其惻然而以中怛之怛之而不早悟也是之謂下愚而不可動化者也子華子曰天之精氣其大數常出三而入一其在人呼則出也吸則入也是故一之謂專二之謂耦三之謂化專者才也耦者幹也化者神也凡精氣以三成三者成數矣宓犠軒轅所柄以計者也赫胥大庭惝恍如有所遺者也故曰出於一立於兩成於三連山以之而呈形歸藏以之而御氣大易以之而立數也子華子曰道之所載四出拓或作宕坦有足者斯踐之矣夫何故平故也恢潏濛澒而無不容一與二二與三吾不知其攸然而同謂之平夫何故虚故也惟虚爲能集道惟平爲能載道無所於閡無所於忤虚之至也左不偏於左右不偏於右無作好也無作惡也如懸𢖍者然平之至也心胷之兩間其容幾何然則歷陸嶔嶇太行鴈門橫塞之靈臺之關勺水之不通而奚以有容嗜欲炎之好憎冰之炎與冰交戰焉則必兩相傷者矣是故革四擴則裂胃中滿則充薄氣發喑惴怖作狂積憂損心心氣乃焦故曰一虚一平而道自生一平一虚而道自居子華子曰王者樂其所以王亡者亦樂其所以亡故烹獸不足以盡獸嗜其脯則幾矣王者有嗜于理義也亡者亦有嗜乎暴慢也所嗜不同故其禍福亦不同也子華子曰生者死之對有者無之反庳者隆之因虧者成之漸大道無形無數無名無體以無體故無有生死以無名故無有有無以無數故無有隆庳以無形故無有成虧既已域於四象者矣完不能無毁也是以韋革雖柔擴之則裂礦石雖堅攻之則碎剛柔重輕大小長短雖不同也同於一盡故古之制字字爲之破而文亦如之子華子曰周天之日爲三百有六十閲月之時爲數三百有六十天地之大數不過乎此五方之物其爲數亦如之鱗蟲三百有六十震宫蒼龍爲之長羽蟲三百有六十離宫朱鳥爲之長毛蟲三百有六十兌宫麒麟爲之長介蟲三百有六十坎宫伏龜爲之長倮蟲三百有六十盈宇宙之間人爲之長一人之身爲骨凡三百有六十精液之所朝夕也氣息之所吐吸也心意知慮之所識也手足之所運動而指股之所信屈也皆與天地之大數通體而爲一故曰天地之間人爲貴子華子曰撞鈞石之鐘六樂合奏於庭所以寫樂也而隱憂者臨之而逾悲不主乎樂故也鬱摇而行歌促絃而急彈所以寫憂也而安恬者得之而逾歡不主於憂故也然則憂樂在外也所以主之者内也内之所感赭蒼互色東西貿區而昧者則不之知也故曰觀流水者與水俱流其目運而心逝者歟子華子曰渾淪鴻濛道之所以爲宗也徧覆包涵天之所以爲大也昭明顯融帝之所以爲功也道無依阿天無從違帝無决擇然則心烏乎而宅道心天也天心帝也帝心人也人之心莫隱乎慈莫便乎恕赤子匍匐使我心惻隱於慈故也陵波而先濟跋而望乎後之人便於恕故也此心之弗失焉可以事帝矣可以格天矣可以入道矣此心之弗存焉道之所去也天之所違也帝之所誅也古之制字者兹心爲慈如心爲恕非其心也則失類而悲是以挾道理以御人羣者庸詎而忽諸子華子曰凡物之有所由者事之所以相因也理之所以相然也軸之軸車由所以相運也紬之紬思或作絲由是以相屬也姓伷之由族由是以有分也橘柚之柚味由是以有别也宇宙之宙理由是以有傳也禾之油油穀由是以登也雲之油油雨由是以降也憂心有妯心由是以動也左旋右抽軍由是以止也故凡物之有所由者事之所以相因也理之所以相然者也予華子卷之七
