front:
  text: 子華子卷之九顛九
  hash: sha256:770f420088d1ce6aeab3f39e5a98084967c358674ee084632bdeca8906d3e9c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_HFL_009-001a, image: hfl/0841/0841-102.png}
body:
  text: 晋人程本著北宫意問北宫意問曰上古之世天不愛其寳是以日月淑清而揚光五星循晷而不失其次鳳凰至蓍龜兆甘露下竹實滿流黄出朱草生敢問何所修爲而至於是也子華子曰異乎吾所聞夫楨祥瑞應之物有之足以備其數無之不缺於治也聖王不識也君子不道也治世所無有也上古之世居有以虚宰多以少所以同於人者用舍也所以異於人者神明也神明之運其由也甚微其效也甚徑與變相蕩遷與化相推移陰陽不能更四序不能虧洞於纖微之域通於恍惚之庭挹之而不沖注之而不滿彼其視鳳凰麒麟也豢牢之養爾彼其視澧液甘露也甽澮之寫爾彼其視芝房竹實凡草木之異者畦圃之毓爾彼其視玉石環怪凡種種之族者篋襲之藏爾故曰聖王不識也君子不道也治世所無有也昔者有虞氏彈五絃之琴以歌南風之詩而光被四表格于上下周公之佐成王也希膳不徹於前鐘鼓不解於懸而歌雍詠勺六服承德凡禎祥瑞應之物有之足以備其數無之不缺於治聖王已没天下大亂父子質性君臣失紀未有甚於今日也然且日月星辰𢖍陳於上與治世同焉而已矣故曰天道遠人道邇待蓍龜而襲吉福之末也顛蹶望拜而謁焉其待則薄矣故聖王不識也君子不道也治世所無有也吾恐後世之人主方且睢睢盱盱唯此之事而爲人臣者巧詐誕譎以容悅於其君舍其所當治而責成於天借或氣然而數繆也忽有鍾其變者色澤狀貌非耳目之所屬也於是奉以爲祥君臣動色士庶革聽以至作爲聲歌而薦之於郊廟錯采繢畫而以夸諸其臣民奄然以爲後世莫我之如也彼其却數於上世其所謂豢牢之養也甽澮之寫也畦圃之毓也篋襲之藏也章章焉如日星之在上也乃始矜跂而以爲希有之事夷世而不可以幸冀者也甚矣其亦弗該於帝王之量者矣子華子居於苓北宫意公仲承侍縱言而及於醫子華子曰醫者理也理者意也藥者瀹也瀹者養也腑藏之伏也血氣之留也空窾之塞也關鬲之礙也意其所未然也意其所將然也察於四然者而謹訓於理夫是之謂醫以其所有餘也而養其所乏也以其所益多也而養其所損也反其所養則益者彌損矣反其所養則有餘者彌乏矣察於二反者而加䟽瀹焉夫是之謂藥故曰醫者理也理者意也藥者瀹也瀹者養也北宫意曰正惟是世俗之醫所不能爲也雖然意聞之也有所資於意不知無意之爲愈也有所待於養不如無待之爲愈也敢問人有精神也其升降上下與晝夜相通也與天地相灌注也其爲種凡有幾子華子曰意善哉而之問也觸類以演之進乎此則與知道者謀矣吾次其所以學也而擇取之矣夫天降一氣則五氣隨之寄備於陰陽合氣而成體故有太陽有少陽有太陰有少陰陰中有陽陽中有陰故陽中之陽者火是也陰中之陰者水是也陽中之陰者木是也陰中之陽者金是也土居二氣之中間以治四維在陰而陰在陽而陽故物非土不成人非土不生北方陰極而生寒寒生水南方陽極而生熱熱生火東方陽動以散而生風風生木西方陰止以收而生燥燥生金中央陰陽交而生濕濕生土是故天地之間六合之内不離於五人亦如之血氣和合榮衛流暢五藏成就神氣舍心魂氣畢具然後成人是故五藏六腑各有神主精禀於金火氣諧於水木精氣之合是生十物精神魂魄心意志思智慮是也生之所自謂之精兩精相薄謂之神隨神往反謂之魂並精出入謂之魄所以格物謂之心心有所憶謂之意意之所存謂之志志之所造謂之思思而有所顧慕謂之慮慮而有所決釋謂之智夫於智十累之上也至於智則知所以持矣知所以持則知所以養矣榮衛之行無失厥常六腑化穀津液布陽故能久長而不弊流水之不腐以其逝故也户樞之不蠧以其運故也是以精上則滯神惛則伏䰟拘則沉魄散則耗心忮則惑志鬱則陷意營則罔思澁則殆慮殫則蒙智礙則愚故所謂持者持此者也所謂養者養此者也意善哉而知問也觸類以演之進乎此則與之道者謀矣公仲子曰夫子之言也而之問也承也得所未之嘗聞如發蔀焉願夫子益其說而稽徵其所以解也子華子曰然言固不可以一而足也夫心也五六之主也精神之舍也心之精爲火其氣爲離其色赤其狀如覆蓮其神爲朱鳥其竅上通於舌肝之精爲木其氣爲震其色青其狀如懸瓢其神爲蒼龍其竅上通於目肺之精爲金其氣爲兌其色白其狀如懸磬其神爲伏虎其竅上通於鼻腎之精爲水其氣爲坎其色黑其狀如介石其神爲玄竈其竅上通於耳脾之精爲土其氣爲戊已其色黄其狀如覆缶其神爲鳳凰其竅上通於口是故脾腎心肝肺五官之司口舌鼻耳目五官之候脾之藏意腎之藏精心之藏神肝之藏䰟肺之藏魄金木水火土五精之總也寒熱風燥濕五氣之聚也水以潤之火以熯之土以溽之木以敷之金以歛之此以其性言也水之冽也火之炎也土之蒸也木之温也金之清也此以其氣言也水在下火在上土在中木在左金在右此以其位言也水之平也火之銳也土之圜也木之曲直也金之方也此以其形言也水則因火則革土則化木則變金則從革此以其材言也水井洫也火爨冶也木金器械也土爰稼穡也此以其事言也夫盈於天地之間而充物者惟此五物也凡五物之有不可無也其所無不可有也微者養之使章弱者養之使强損者養之使益不足者養之使有餘無物不養也無物不備也夫是之謂和喜怒哀恐思不能汨也視聽言貌思不能奪也夫是之謂大和之國無待於意而爲醫大和之俗無得於養而爲藥不以物滑和不以欲亂情中無載則道集於虚矣心無累則道載於平矣安平恬愉吐故納新静與陰同閉動與陽俱開若是者由人而之天合於太初之三氣矣以之正心修身治國家天下無以易於此術也吾之說盡於此矣二子拱而退書以識之子華子卷之九
