body:
  text: 子華子序顛五護左都水使者光祿大夫臣向言所校讎中子華子書凡二十有四篇以相校復重十有四篇定著十篇皆以殺青書可繕寫子華子程氏名本字子華晉人也晉自頃公失政政在六卿趙簡子始得志招徠賢俊之士為其家臣子華子生於是時博學能通墳典丘索及故府傳記之書性闓爽善持論不肯苟容於諸侯聚徒著書自號程子名稱籍甚聞於諸侯孔子遇諸郯歎曰天下之賢士也簡子欲仕諸朝而不能致乃遣使者奉纁幣聘以為爵執圭是時簡子殺竇犢及舜華孔子為作臨河之操子華子亦逡巡不肯起簡子大怒將脅之以兵子華子去而之齊齊景公不能用也子華子館於晏氏更題其書曰子華子簡子卒襄子立子華子反於晉時已老矣遂不復仕以卒今其書編離簡斷以是門人弟子共相綴隨紀其所聞而無次敘非子故所著之書也大抵子華子以道德為指歸而經紀以仁義存誠養操不苟於售唯孔子然後知其賢齊大夫晏平仲與之為久要之交當時諸侯以勢相軋爭結怨連禍日以權譎為事子華子之言如持水納石不相酬答卒以不遇可為酸鼻謹目録臣向昧死上
