front:
  text: 子華子卷之五六同卷顛七
  hash: sha256:6e42befac79c76ec27b42c4852a2214c340a6cfccd43f8195e0cd5ca2a52a8a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_HFL_005-001a, image: hfl/0841/0841-056.png}
body:
  text: 晋人程本著晏子子華子謂晏子曰天地之間有所謂隱戮者而莫之或知知之者其幾於道乎晏子曰何謂也子華子曰天地之生才也實難其有以生也必有所用也如之何其將擁之蔽之而使之不得以植立也天地之所大忌也日月之所燭燎也陰陽之所杌移也鬼神之所伺察也是以帝王之典進賢者受上賞不薦士者罰及其身善善而惡惡其實皆衍于後嘗試觀之夫物之有材者其精華之藴神明之所固護而祕惜不可以知力窺也蒙金以沙固玉以璞珠之所生漩栢之淵而隈澳之下也豫章楩柟之可以大斲者必在夫大山穹谷孱顔嶇峿之區抉剔之掎摭之剥削之苟不中於程度則有虎狼蛟噩虺蜴之變雷霆崩墜覆壓之虞何以故天地之生才也實難其有以生也必有所用也如之何其將擁之蔽之而使之不得以植立是之謂違天而黷明違天而黷明神則殛之雖大必折雖炎必撲荒落而類圯敗而族夫是之謂隱戮隱戮也者陰隲之反也如以匙勘鑰也如以璽印塗也必以其類其應如響晏子曰駭乎哉吾子之言也嬰也願遂其所以聞子華子曰大夫無甚怪於余之所以言也余之所以言其有以云也今夫人之常情爲惡其毁也成惡其虧也於其所愛焉者則必有恪固之心恪固之心萌於中虚卒然而攻其所甚愛則必曹起而爭爭而不得則必氣沮而志奪氣沮而志奪則拂然而怒塡乎膺拂然而怒塡乎膺則將無與爲敵者矣天地之所以生材也甚愛之甚惜之則其所以有恪固之心曾何以異夫人之常情世之人莫之或知也徒恃其胷腹之私與其狡譎變詐之數翕翕而訿訿巧觝而深排規以幸人不已勝也夫人之勝人也何有天地之鑒也神明之照也甚可畏也甚可怖也如使之氣沮而志奪拂然而怒以充塞乎兩間偏俱尫蹷聚而爲陰陽之罰其中於人也必慘矣是必至之勢而無足經怪者悲夫世之人莫之或知知之者其幾於道矣本也晋國之鄙人也嘗得故記之所道者矣昔先大夫欒武子之在位也夙夜靖共矯枉而惠直不忘其職守而以從其君厥有顯聞布在諸侯之册書逮其嗣主則不然弗類于厥心放命以自賢怙寵專權翦棄人士圖以封殖于厥躬國人疾視之如目有眯焉日移其志以速厥罰欒氏以亡昔先大夫隨武子之在位也明睿以博識晋國之雋老也然且慆焉而不自居惟曰余有所不見惟曰余有所不知惟曰余有所不聞暝有所志旦而升諸公是以晋國之士無遺其材者用能光融昭著以有立於朝父子兄弟以世及也而爲晋宗卿逮其嗣主則不然嚚嚚自庸而巧持其非心毁本塞原甚於虺目惟諛佞之小夫是暱是用絜然知者遠之洒然善者伏藏以在下日移其志以速厥罪范氏以亡昔先大夫中行文子之在位也㧞識俊良振其滯淹人之有技能如岀于厥躬恪謹弗解惟力是視是以能相其君以尋盟諸侯逮其嗣主以苛爲察以欺爲明以刻爲忠以計多爲善以聚歛爲良崩角摘齒恐人之軋已也門如鬧巿惟利是視憸人乘間而會逢其惡極其回邪如鬼如蜮日移其志以速厥罰中行氏以亡凡此三主者晋國之世臣也所謂崇藴穹窿而不遷之宗也而又其先大夫皆有玄德以媚于上下神祇其在嗣主荒墜厥訓用以覆宗滅緒餒其先靈而不得以血食于晋國無他故也恃其盛强昌庶而蔑棄於理憑人而勝天藏忮於中而以之違天地之所恪固是以其酷如是也而况於單族後門之士竊人之爵禄而邀覬於一時之幸虚愒而恫疑且懼人之出於其上也疑似之迹未明同異之志未講而壅之蔽之使之不得以植立也則其得禍也必有深於晋之三主者矣夫築垣墉者務其高而不務其實高不隱仞而基傾之矣以兩手而揜人之聰明自以爲得也而不知其聾瞽之疾已移於己也悲夫夫豈不爲之大哀矣乎晏子曰駭哉乎言也微吾子嬰無所聞之嬰也請刻諸佩觽以志其不忘也晏子問於子華子曰齊之公室懼卑奈何子華子曰夫人之有欲也天必隨之齊將卑是求夫何懼而不獲昔者軒轅二十五宗故黄祚衍于天下于今未忘也宗周之王也姬姓之封者凡七十夫指之不能率其臂猶臂之不能運其體也今齊自襄桓以來斬斬焉朝無公姓野無公田帶甲橫兵挾轂而能戰非公士也結綬纚纚位列而籍居非公臣也公族之子若其孫散而之於四方惟童隸是伍公所以與俱者自有肺腸者也於詩有之豈無他人不如我同姓何以是踽踽而以臨於人上也齊將卑是求夫何懼而不獲今之人分財賄而設鉤策焉非以夫鈎策者爲能均也使善惡多寡無所歸其怨也是以聖人窮造物以爲識量然且龜卜蓍筮以爲决所以立言於公也聲出而應律身出而協度然且權量尺石以爲器所以立正於公也義適而理訓舉天下無敢以容其議然且書契章程以爲式所以立信於公也德澤汪濊威制宏遠盡四海之大無不面納然且法制禮籍以爲準所以立義於公也今齊則不然所以爲國舉出於私矣非止乎此而已也而又公歛其怨私受其福矣公賓其名私享其實矣齊之亡於公室也非一日也故齊將卑是求夫何懼而不獲子華子曰昔先王之制法也有本衍焉有末度焉因而弗作守而弗爲去羨去慕與四時分其叙與寒暑一其度不言而民以之化不令而民以之服是以能因則大矣能守則固矣夫有心於作法之細也作而刻其眞法之原也法也者制世之麤迹也而且不可以容心焉而況於營道術乎於傳有之循道理之數而以輔萬物之自然六合不足均也七十九代之君其爲法不同而俱王於天下用此道也子華子卷之五
