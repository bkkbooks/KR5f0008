front:
  text: 子華子卷之一二同卷
  hash: sha256:06b64582a9b2b721aaba205a89e71f4d4e36e07e766e152c3d8aa98d594708f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0008_HFL_001-001a, image: hfl/0841/0841-008.png}
body:
  text: 晉人程本著陽城胥渠問陽城胥渠因北宫子以見子華子曰胥渠願有所謁也夫太初胚胎萬有權輿風轉誰轉三三六六誰究誰使夫子聞諸故記者審矣其有以發也胥渠願承其餘子華子曰噫嘻本何足以識之請以嘗試言之而子亦嘗試而聽之夫混茫之中是名太初實生三氣上氣曰始中氣曰元下氣曰玄玄資於元元資於始始資於初太真剖割通三而為一離之而為兩各有精專是名陰陽兩兩而三之數登於九而究矣是以棲三陰之正氣於風輪其專精之名曰太玄棲三陽之正氣於水樞其專精之名曰太一太一正陽也太玄正陰也陽之正氣其名赤陰之正氣其色黑水陽也而其伏為陰風陰也而其發為陽上赤下黑左青右白黃潛於中宫而五運流轉故有輪樞之象焉水涵太一之中精故能潤澤百物而行乎地中風涵太玄之中精故能動化百物而行乎天上上赤之象其宫成離下黑之象其宫成坎夫兩端之所以平者以中存乎其間故也中名未立兩端不形是以坎離獨斡乎中氣中天地而立生生萬物新新而不窮陽氣為火火勝故冬至之日燥陰氣為水水勝故夏至之日濕火則上炎水則下注鳥飛而上魚動而下物類相動焱本相應孰究其所以來誰使其所以然因其然也然不然也然乎然不然乎不然吾亦不知其所以然也夫是之謂萬化原上決而成天下決而成地既已決也命之曰中決必有所合也命之曰和中和玄同萬物化生夫是之謂三三六六陽城胥渠曰微夫子之言吾幾於不靈子華子曰噫嘻本何足以識之請以嘗試言之而子亦嘗試聽之子華子曰夫道一也我與道而為三矣而我之百骸九竅毛髮膏澤藏腑肝膈吹噓吸引滋液吐納無非道也自此以往大撓甲子所不能紀也是故道立於一而萬物之變也百事之化也散而為萬殊奫淪而無涯古之知道者務全其生務全其生者不亡其所有也不亡其所有者道之守也道之守者神之舍也是故全生者為上虧生者次之死次之迫斯為下矣所謂全生者六欲皆得其宜也所謂虧生者六欲分得其宜也夫虧生則於其所尊者薄矣其虧彌甚則其尊彌薄所謂死者無有所知而復其未生也所謂迫生者六欲莫得其宜也皆獲其所甚惡者也辱莫大於不義不義者迫生也故曰迫生不如死人之常情耳聞而目見也耳聞所甚惡不如無聞目見所甚不欲不如無見是以迅雷則掩耳恐故也所貴乎嗜梁肉者非腐鼠之謂也所貴乎飲醪醴者非敗酒之謂也所貴乎尊生者非迫生之謂也夫迫生之人鞠窮而歸故曰迫斯為下矣公仲承問於程子曰人有常言黃帝之治天下也百神出而受職於明堂之庭帝乃采銅於首山作大爐焉鑄神鼎於山上鼎成羣龍下迎乘彼白雲至于帝鄉羣小臣不得上升攀龍之胡力顫而絶帝之弓裘墜焉於是百姓奉之以長號故名之曰烏號之弓而藏其衣冠於橋陵信有之乎程子曰否甚矣世之好譎怪也聖人與人同類也類同則形同形同則氣同氣同則知識同矣類異則形異形異則氣異氣異則知識異矣人之所以相君長者類也相使者形也相管攝者氣也相維持者知識也人之異於龍龍之異於鼎鼎之異於雲言之辨也惡足以相感召而賓使之耶其不然也必矣世之好譎怪也吾聞之太古之聖人所以範世訓俗者有直言者有曲言者直言者直以情貢也曲言者假以指喻也言之致曲則其傳也久傳久而偽則知者正之訛甚而殽亂則知者止之夫黃帝之治天下也其精微之感蕩上浮而下沉故為百福之宗為百福之所宗則是百神受職於庭也帝乃采銅者鍊剛質也登彼首山就高明也作為大爐鼓陽化也神鼎熟物之器也上水而下火二氣升降以相濟中和之實也羣龍者衆陽氣也雲者龍屬也帝鄉者靈臺之關而心術之變也帝之謂所類也形也氣也知識也雖與人同爾然而每成而每上也每成而每上則其精微之所徹達神明之所之適其去人也遠矣羣小臣知識之所不及者也攀龍之胡有見於下也不得上升無見於上也有見於下無見於上者士也上下無見者民也弓裘衣冠者帝所以善世制俗之具也民無見也懷其所以治我者而已矣故帝之逝也號以決其慕藏以奉其傳此假以指喻之言也而人且亟傳之以相詆欺甚矣世之好譎怪也千世之後必有人主好高而慕大以久生輕舉而為羡慕者其左右狡詐希寵之臣又從而逢之是將甘心於黃帝之所造者矣夫人之大常生而少壯轉而為衰老轉而為死亡聖凡之所共也上知之所弗幸免焉者也且自故記之所傳若存而若亡大庭中黃赫胥尊盧以來所謂聖人者不一族吾誠恐大圜之上嶢榭聯纍雖處什伯不足以處也而復何所主宰臣何所使而其昏昏默默以至于今也是不然之甚者也然而世之人知者歆羡愚者矜跂甚矣世之好譎怪也夫周之九鼎禹所以圖神姦也黃帝之鑄一禹之鑄九其造為者同而所以之適焉者頓異是可以決疑矣且世之傳疑也不惟其傳昔宋有丁氏家故無井而出溉汲焉常一日而一人居外懲其如是也鳩工而穿井于庭家相與語曰今吾之穿井得一人矣有聞而傳之者曰丁氏穿井而得一人也國人更相道之語徹于宋君宋君召其人而質之丁氏對曰自臣穿井家獲一人之力非得一人於井也是故黃帝之鑄神鼎是井中人之譬也知者正之是宋君召其人而質之之譬也千世之後必有人主好高而慕大以久生輕舉而為羡慕者其左右狡詐希寵之臣又從而逢之是將甘心於黃帝之所造者矣此吾所以反之復之而不能已者也小子志之郯子以達于禮聞於諸侯子華子亟往從之見郯子焉子華子曰異乎吾所聞夫禮先王所以定之也非所以搖之也夫禮先王所以開之也非所以暴之也青黃黼黻文章之觀盡而五色渝宫徵還激生生之聲足而八音汩陸有羅罝水有網罟而飛羽伏鱗無以幸其生矣詩不云乎潛雖伏矣亦孔之昭今郯子非徒搖之也又從暴之也郯子而達於禮樂異乎吾所聞肅駕而起導塗而歸子華子卷之一
